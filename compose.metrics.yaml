services:
    prometheus:
        image: prom/prometheus:latest
        ports:
            - "9090:9090"
        volumes:
            - ./tests/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
        extra_hosts:
            - "host.docker.internal:host-gateway"

    # Traces backend. Receives Sōzune spans over OTLP/gRPC on :4317 and is
    # queried by Grafana. Point `tracing.endpoint` at http://127.0.0.1:4317.
    tempo:
        image: grafana/tempo:latest
        command: ["-config.file=/etc/tempo.yaml"]
        ports:
            - "3200:3200"   # Tempo query API (Grafana datasource)
            - "4317:4317"   # OTLP/gRPC ingest
        volumes:
            - ./tests/observability/tempo.yaml:/etc/tempo.yaml:ro

    grafana:
        image: grafana/grafana:latest
        ports:
            - "3000:3000"
        environment:
            GF_AUTH_ANONYMOUS_ENABLED: "true"
            GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
            GF_AUTH_DISABLE_LOGIN_FORM: "true"
        volumes:
            - ./tests/observability/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
            - ./tests/observability/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/sozune.yml:ro
            - ./tests/observability/dashboards:/var/lib/grafana/dashboards:ro
        depends_on:
            - prometheus
            - tempo
