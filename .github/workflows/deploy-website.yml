name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'documentation/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: website
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: website
        run: bun run build --mode production
        env:
          NODE_ENV: production

      - name: Copy documentation assets
        run: |
          mkdir -p website/public/dist/documentation/assets
          cp -r documentation/assets/. website/public/dist/documentation/assets/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/public/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
