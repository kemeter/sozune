name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: oven-sh/setup-bun@v2

      - name: Build dashboard
        run: cd dashboard && bun install --frozen-lockfile && bun run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/sozune dist/sozune
          cd dist && tar -czf sozune-${{ github.ref_name }}-linux-amd64.tar.gz sozune

      - uses: actions/upload-artifact@v4
        with:
          name: sozune-linux-amd64
          path: dist/sozune-${{ github.ref_name }}-linux-amd64.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [docker, binary]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: sozune-linux-amd64
          path: dist

      - name: Extract changelog section
        id: changelog
        run: |
          version="${{ github.ref_name }}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md \
            dist/sozune-${{ github.ref_name }}-linux-amd64.tar.gz
